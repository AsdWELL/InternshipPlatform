services:
  zookeeper:
    image: bitnami/zookeeper:3.9.3
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - 2181:2181

  kafka:
    image: bitnami/kafka:3.7.1-debian-12-r9
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=INTERNAL://:9093,OUTSIDE://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9093,OUTSIDE://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper
    healthcheck:
        test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9093 --list"]
        interval: 5s
        timeout: 5s
        retries: 10
        start_period: 10s
    volumes:
      - kafka-data:/tmp/kafka-logs

  kafka-init:
    image: bitnami/kafka:3.7.1-debian-12-r9
    depends_on:
        kafka:
            condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      kafka-topics.sh --bootstrap-server kafka:9093 --list

      echo -e 'Creating kafka topics'
      kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic PlatformNotifications --replication-factor 1 --partitions 1

      echo -e 'Successfully created the following topics:'
      kafka-topics.sh --bootstrap-server kafka:9093 --list
      "
        

volumes:
  kafka-data: